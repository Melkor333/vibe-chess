name = "vibe_chess"
version = "1.0.0"
target = "javascript"

description = "Chess board memorization learning platform"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
chessy = { git = "https://github.com/Melkor333/chessy.git", ref = "main" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.0.0 and < 3.0.0"

[tools.lustre]

[tools.lustre.build]
outdir = "./dist"

[tools.lustre.dev]
host = "localhost"
port = 1234
